server {
    listen 80;
    server_name _;
    charset utf-8;

    # Send RELATIVE redirects (e.g. Location: /admin/ instead of
    # http://localhost/admin/). Required when running behind a reverse proxy
    # like GitHub Codespaces, otherwise the trailing-slash redirect for
    # directory URLs (/admin -> /admin/) leaks the internal "localhost" host.
    absolute_redirect off;
    port_in_redirect off;

    # ----- Frontend (static SPA pages + assets) -----
    root /var/www/frontend;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Enforced only over HTTPS (browsers ignore HSTS on plain HTTP).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ----- API -> PHP front controller -----
    location /api/ {
        root /var/www/backend/public;
        try_files $uri /index.php$is_args$args;
    }

    location = /index.php {
        root /var/www/backend/public;
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
    }

    location ~ ^/index\.php {
        root /var/www/backend/public;
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
    }

    # Static frontend assets + page fallbacks
    # IMPORTANT: do NOT use "$uri/" here. Matching a directory makes nginx issue
    # a 301 trailing-slash redirect (/admin -> /admin/) whose absolute URL is
    # built from the Host header. Behind the Codespaces proxy that Host is
    # "localhost", so the browser gets bounced to http://localhost/admin/.
    # Instead serve the directory's index.html directly -> no redirect at all.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        # Dev/Codespaces: do NOT hard-cache JS/CSS, otherwise frontend fixes only
        # show up after a manual hard-refresh. Revalidate on every load instead.
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
