<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset password — Couponaut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="auth-split">
    <aside class="auth-aside">
      <a href="/" class="auth-logo"><span class="brand-mark" style="width:30px;height:30px;">C</span> Couponaut</a>
      <div>
        <h2 class="auth-aside-title">Almost done — <u>set a new password</u>.</h2>
        <ul class="auth-aside-list">
          <li><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Use 8+ characters</li>
          <li><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Mix letters, numbers &amp; symbols</li>
        </ul>
      </div>
      <div class="auth-aside-foot"><span>Need help? hello@couponaut.app</span></div>
    </aside>

    <main class="auth-main">
      <div class="auth-form-wrap fade-up">
        <a href="/" class="flex items-center gap-2 mb-6 md:hidden" style="text-decoration:none;color:var(--text);">
          <span class="brand-mark" style="width:30px;height:30px;">C</span><span class="font-extrabold">Couponaut</span>
        </a>
        <h1 class="h-display" style="font-size:1.7rem;">Set a new password</h1>
        <p class="text-muted text-sm mt-1">Choose a strong password for your account.</p>

        <form id="form" class="mt-7 grid gap-4">
          <div>
            <label class="label">New password</label>
            <input id="password" type="password" class="input" placeholder="At least 8 characters" required autocomplete="new-password" />
          </div>
          <div>
            <label class="label">Confirm password</label>
            <input id="password_confirmation" type="password" class="input" placeholder="Repeat password" required autocomplete="new-password" />
          </div>
          <div id="err" class="badge badge-red hide"></div>
          <button id="submit" class="btn btn-primary btn-lg" type="submit">Update password</button>
        </form>
        <div class="mt-5 text-sm text-muted text-center">
          <a href="/login" class="text-accent" style="text-decoration:none;font-weight:600;">Back to sign in</a>
        </div>
      </div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>CFAuth.initReset();</script>
</body>
</html>
