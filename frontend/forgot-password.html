<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Forgot password — Couponaut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="auth-split">
    <aside class="auth-aside">
      <a href="/" class="auth-logo"><span class="brand-mark" style="width:30px;height:30px;">C</span> Couponaut</a>
      <div>
        <h2 class="auth-aside-title">We'll get you back in, <u>fast</u>.</h2>
        <ul class="auth-aside-list">
          <li><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Secure, one-time reset link</li>
          <li><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Your saved coupons stay safe</li>
        </ul>
      </div>
      <div class="auth-aside-foot"><span>Need help? hello@couponaut.app</span></div>
    </aside>

    <main class="auth-main">
      <div class="auth-form-wrap fade-up">
        <a href="/" class="flex items-center gap-2 mb-6 md:hidden" style="text-decoration:none;color:var(--text);">
          <span class="brand-mark" style="width:30px;height:30px;">C</span><span class="font-extrabold">Couponaut</span>
        </a>
        <h1 class="h-display" style="font-size:1.7rem;">Forgot password</h1>
        <p class="text-muted text-sm mt-1">Enter your email and we'll send you a reset link.</p>

        <form id="form" class="mt-7 grid gap-4">
          <div>
            <label class="label">Email</label>
            <input id="email" type="email" class="input" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div id="err" class="badge badge-red hide"></div>
          <div id="ok" class="badge badge-green hide"></div>
          <button id="submit" class="btn btn-primary btn-lg" type="submit">Send reset link</button>
        </form>
        <div class="mt-5 text-sm text-muted text-center">
          <a href="/login" class="text-accent" style="text-decoration:none;font-weight:600;">Back to sign in</a>
        </div>
      </div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>CFAuth.initForgot();</script>
</body>
</html>
