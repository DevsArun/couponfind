<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Couponaut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="min-h-screen flex items-center justify-center px-5 relative">
    <div class="grid-bg" style="position:absolute;inset:0;height:340px;"></div>
    <div class="card p-8 w-full fade-up" style="max-width:420px;position:relative;">
      <a href="/" class="flex items-center gap-2 mb-6" style="text-decoration:none;color:var(--text);">
        <span class="brand-mark" style="width:30px;height:30px;">C</span>
        <span class="font-extrabold">Couponaut</span>
      </a>
      <h1 class="h-display" style="font-size:1.6rem;">Forgot password</h1>
      <p class="text-muted text-sm mt-1">Enter your email and we'll send you a reset link.</p>

      <form id="form" class="mt-6 grid gap-4">
        <div>
          <label class="label">Email</label>
          <input id="email" type="email" class="input" placeholder="you@example.com" required />
        </div>
        <div id="err" class="badge badge-red hide"></div>
        <div id="ok" class="badge badge-green hide"></div>
        <button id="submit" class="btn btn-primary" type="submit">Send reset link</button>
      </form>
      <div class="mt-4 text-sm text-muted text-center">
        <a href="/login" class="text-accent" style="text-decoration:none;">Back to sign in</a>
      </div>
    </div>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>CFAuth.initForgot();</script>
</body>
</html>
