<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control — Couponaut Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="app-sidebar admin-dark" style="width:264px;">
      <div class="admin-side-head">
        <a href="/" class="admin-brand">
          <span class="brand-mark" style="width:32px;height:32px;">C</span>
          <span><span class="admin-brand-name">Couponaut</span><span class="admin-brand-sub">Mission Control</span></span>
        </a>
      </div>
      <div class="admin-profile">
        <span class="admin-avatar" id="side-avatar">A</span>
        <div style="min-width:0;">
          <div class="admin-profile-name" id="side-name">Administrator</div>
          <div class="admin-profile-role">Super Admin</div>
        </div>
      </div>
      <nav id="nav" class="admin-nav"></nav>
      <div class="admin-side-foot">
        <a href="/app" class="admin-foot-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></svg> Visit app</a>
        <button id="logout-side" class="admin-foot-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg> Sign out</button>
      </div>
    </aside>
    <main class="app-main">
      <header class="app-header glass flex items-center justify-between px-6 h-16" style="position:sticky;top:0;z-index:30;border-left:none;border-right:none;border-top:none;">
        <div class="flex items-center gap-2" style="min-width:0;">
          <button id="menu-btn" class="menu-btn btn btn-ghost" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div class="flex items-center gap-2" style="min-width:0;"><span class="dot ok" id="health-dot" style="flex:none;"></span><span id="health-text" class="text-sm text-muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">checking…</span></div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <button onclick="UI.openCmdk()" class="btn btn-ghost btn-sm hidden sm:inline-flex">⌘K</button>
          <div class="flex items-center gap-2"><span id="avatar" style="width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;"></span><span id="user-name" class="text-sm font-semibold hidden md:block"></span></div>
          <button id="logout" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </header>
      <div id="view" class="p-6 max-w-7xl mx-auto"></div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script>
    (function () {
      var sb = document.getElementById('sidebar');
      var ov = document.getElementById('sidebar-overlay');
      var mb = document.getElementById('menu-btn');
      function open() { sb.classList.add('open'); ov.classList.add('open'); }
      function close() { sb.classList.remove('open'); ov.classList.remove('open'); }
      if (mb) mb.addEventListener('click', open);
      if (ov) ov.addEventListener('click', close);
      if (sb) sb.addEventListener('click', function (e) { if (e.target.closest('.nav-item')) close(); });
      window.addEventListener('hashchange', close);
    })();
  </script>
</body>
</html>
