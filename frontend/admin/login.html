<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin Sign in — Couponaut Mission Control</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="auth-split">
    <aside class="auth-aside admin">
      <a href="/" class="auth-logo"><span class="brand-mark" style="width:30px;height:30px;">C</span> Couponaut <span class="badge badge-muted" style="background:rgba(255,255,255,0.16);color:#fff;letter-spacing:0.08em;">ADMIN</span></a>
      <div>
        <h2 class="auth-aside-title">Mission Control</h2>
        <ul class="auth-aside-list">
          <li><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Full platform control &amp; analytics</li>
          <li><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Engine, coupons, billing &amp; users</li>
        </ul>
      </div>
      <div class="auth-aside-foot"><span>Administrator access only · secured</span></div>
    </aside>

    <main class="auth-main">
      <div class="auth-form-wrap fade-up">
        <div class="flex items-center gap-2 mb-6 md:hidden">
          <span class="brand-mark" style="width:30px;height:30px;">C</span><span class="font-extrabold">Couponaut</span>
          <span class="badge badge-muted" style="margin-left:auto;letter-spacing:0.08em;">ADMIN</span>
        </div>
        <h1 class="h-display" style="font-size:1.6rem;">Admin sign in</h1>
        <p class="text-muted text-sm mt-1">Administrator access only. Sign in with an admin account.</p>

        <div id="err" class="hide" style="background:rgba(220,38,38,0.09);color:#dc2626;border:1px solid rgba(220,38,38,0.3);border-radius:10px;padding:0.6rem 0.8rem;font-size:0.85rem;margin-top:1rem;"></div>

        <form id="form" class="mt-6 grid gap-4">
          <div>
            <label class="label">Admin email</label>
            <input id="email" type="email" class="input" placeholder="admin@yourdomain.com" required autocomplete="username" />
          </div>
          <div>
            <label class="label">Password</label>
            <input id="password" type="password" class="input" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button id="submit" type="submit" class="btn btn-primary btn-lg">Sign in to admin</button>
        </form>

        <p class="text-muted text-xs mt-5">
          Not an administrator? <a href="/login" style="color:var(--brand-blue);text-decoration:none;font-weight:600;">User sign in →</a>
        </p>
      </div>
    </main>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>CFAuth.initAdminLogin();</script>
</body>
</html>
