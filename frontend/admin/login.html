<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Sign in — Couponaut Mission Control</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="min-h-screen flex items-center justify-center px-5 relative" style="overflow:hidden;">
    <div class="hero-aurora" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="grid-bg" style="position:absolute;inset:0;height:340px;"></div>
    <div class="card auth-card p-8 w-full fade-up" style="max-width:420px;position:relative;">
      <div class="flex items-center gap-2 mb-5">
        <span class="brand-mark" style="width:30px;height:30px;">C</span>
        <span class="font-extrabold">Couponaut</span>
        <span class="badge badge-muted" style="margin-left:auto;letter-spacing:0.08em;">ADMIN</span>
      </div>
      <h1 class="h-display" style="font-size:1.55rem;">Mission Control</h1>
      <p class="text-muted text-sm mt-1">Administrator access only. Sign in with an admin account.</p>

      <div id="err" class="hide" style="background:rgba(220,38,38,0.09);color:#dc2626;border:1px solid rgba(220,38,38,0.3);border-radius:10px;padding:0.6rem 0.8rem;font-size:0.85rem;margin-top:1rem;"></div>

      <form id="form" class="mt-6 grid gap-4">
        <div>
          <label class="label">Admin email</label>
          <input id="email" type="email" class="input" placeholder="admin@yourdomain.com" required autocomplete="username" />
        </div>
        <div>
          <label class="label">Password</label>
          <input id="password" type="password" class="input" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button id="submit" type="submit" class="btn btn-primary btn-lg">Sign in to admin</button>
      </form>

      <p class="text-muted text-xs mt-5">
        Not an administrator? <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:600;">User sign in →</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>CFAuth.initAdminLogin();</script>
</body>
</html>
