<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Couponaut</title>
  <meta name="description" content="Get in touch with the Couponaut team — support, partnerships, press and feedback." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <p class="eyebrow" style="font-size:0.78rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Contact</p>
    <h1 class="h-display mt-3" style="font-size:clamp(2.1rem,5vw,3.2rem);">We'd love to hear from you</h1>
    <p class="text-muted mt-4" style="font-size:1.05rem;">Questions, partnerships, or feedback — drop us a line and we'll reply within 1–2 business days.</p>
  </section>

  <div class="max-w-5xl mx-auto px-5 pb-10 grid md:grid-cols-3 gap-5">
    <div class="md:col-span-1 grid gap-4 content-start">
      <div class="card p-5">
        <div class="font-bold mb-1">Email</div>
        <a href="mailto:hello@couponaut.app" style="color:var(--accent);text-decoration:none;font-size:0.95rem;">hello@couponaut.app</a>
      </div>
      <div class="card p-5">
        <div class="font-bold mb-1">Support</div>
        <a href="mailto:support@couponaut.app" style="color:var(--accent);text-decoration:none;font-size:0.95rem;">support@couponaut.app</a>
        <p class="text-muted text-sm mt-2" style="margin:0.5rem 0 0;">For account &amp; billing help.</p>
      </div>
      <div class="card p-5">
        <div class="font-bold mb-1">Partnerships</div>
        <a href="mailto:partners@couponaut.app" style="color:var(--accent);text-decoration:none;font-size:0.95rem;">partners@couponaut.app</a>
      </div>
    </div>

    <div class="md:col-span-2">
      <div class="card p-6">
        <h2 class="font-bold mb-4" style="font-size:1.2rem;">Send us a message</h2>
        <form id="contact-form" class="grid gap-4">
          <div class="grid sm:grid-cols-2 gap-4">
            <div><label class="label">Name</label><input class="input" id="c-name" required placeholder="Your name" /></div>
            <div><label class="label">Email</label><input class="input" id="c-email" type="email" required placeholder="you@example.com" /></div>
          </div>
          <div><label class="label">Subject</label><input class="input" id="c-subject" placeholder="How can we help?" /></div>
          <div><label class="label">Message</label><textarea class="input" id="c-message" rows="5" required placeholder="Tell us what's on your mind…"></textarea></div>
          <button type="submit" class="btn btn-primary" style="justify-self:start;">Send message</button>
        </form>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/site.js"></script>
  <script>
    (function () {
      var f = document.getElementById('contact-form');
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('c-name').value.trim();
        var email = document.getElementById('c-email').value.trim();
        var subject = encodeURIComponent(document.getElementById('c-subject').value.trim() || 'Couponaut enquiry');
        var body = encodeURIComponent('From: ' + name + ' <' + email + '>\n\n' + document.getElementById('c-message').value.trim());
        UI.toast('Opening your email app…', 'info');
        window.location.href = 'mailto:hello@couponaut.app?subject=' + subject + '&body=' + body;
      });
    })();
  </script>
</body>
</html>
