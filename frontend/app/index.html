<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Couponaut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- chat-style sidebar: New chat + history on top, account menu at the bottom -->
    <aside id="sidebar" class="app-sidebar glass">
      <div class="p-3">
        <div class="flex items-center gap-2 px-2 mb-3">
          <a href="/" class="flex items-center gap-2" style="text-decoration:none;color:var(--text);">
            <span class="brand-mark" style="width:26px;height:26px;font-size:0.78rem;">C</span>
            <span class="font-extrabold">Couponaut</span>
          </a>
        </div>
        <button id="new-chat" class="btn btn-soft w-full" style="justify-content:flex-start;gap:0.55rem;">
          <span style="width:16px;height:16px;display:inline-flex;" id="newchat-ico"></span> New chat
        </button>
      </div>

      <div class="px-4 pb-1 text-muted" style="font-size:0.68rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;">Chats</div>
      <nav id="nav" class="px-2 pb-2 grid gap-0.5" style="flex:1;overflow-y:auto;"></nav>

      <!-- Account / settings menu (chat-style, bottom-left) -->
      <div class="sidebar-foot">
        <div id="acct-menu" class="acct-menu hide"></div>
        <button id="account-btn" class="acct-btn">
          <span id="avatar" class="acct-avatar"></span>
          <span style="flex:1;text-align:left;min-width:0;">
            <span id="user-name" class="block font-semibold text-sm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
            <span id="user-plan" class="block text-muted" style="font-size:0.72rem;">Account &amp; settings</span>
          </span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--muted);flex:none;"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="app-main">
      <header class="app-header glass flex items-center justify-between px-6 h-16" style="position:sticky;top:0;z-index:30;border-left:none;border-right:none;border-top:none;">
        <div class="flex items-center gap-2" style="flex:1;min-width:0;max-width:560px;">
          <button id="menu-btn" class="menu-btn btn btn-ghost" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div class="header-search flex items-center gap-2" style="flex:1;min-width:0;">
            <span style="width:18px;color:var(--muted);flex:none;" id="hdr-search-ico"></span>
            <input id="global-search" class="input" placeholder="Search coupons… (Enter)" style="border:none;background:transparent;" />
          </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <span id="found-counter" class="badge badge-muted hidden md:inline-flex" title="Coupons found this session">0 coupons found</span>
          <button id="bell" class="btn btn-ghost btn-sm" style="position:relative;"><span style="width:18px;height:18px;display:inline-flex;" id="bell-ico"></span><span id="bell-dot" class="hide" style="position:absolute;top:6px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);"></span></button>
        </div>
      </header>

      <div id="view" class="p-6 max-w-6xl mx-auto"></div>
    </main>

    <!-- Mobile bottom tab bar (native app feel; hidden on desktop) -->
    <nav class="mobile-tabbar" id="tabbar" aria-label="Primary">
      <a href="#dashboard" class="tab" data-match="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
        <span>Home</span>
      </a>
      <a href="/ai" class="tab" data-match="__ai">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.94 15.5A2 2 0 0 0 8.5 14.06l-6.14-1.58a.5.5 0 0 1 0-.96L8.5 9.94A2 2 0 0 0 9.94 8.5l1.58-6.14a.5.5 0 0 1 .96 0L14.06 8.5A2 2 0 0 0 15.5 9.94l6.14 1.58a.5.5 0 0 1 0 .96L15.5 14.06a2 2 0 0 0-1.44 1.44l-1.58 6.14a.5.5 0 0 1-.96 0z"/></svg>
        <span>AI Search</span>
      </a>
      <a href="#saved" class="tab" data-match="saved">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        <span>Saved</span>
      </a>
      <a href="#billing" class="tab" data-match="billing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
        <span>Plans</span>
      </a>
      <button type="button" class="tab" id="tab-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <span>Menu</span>
      </button>
    </nav>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    /* Mobile sidebar drawer toggle */
    (function () {
      var sb = document.getElementById('sidebar');
      var ov = document.getElementById('sidebar-overlay');
      var mb = document.getElementById('menu-btn');
      function close() { sb.classList.remove('open'); ov.classList.remove('open'); }
      if (mb) mb.addEventListener('click', function () { sb.classList.add('open'); ov.classList.add('open'); });
      if (ov) ov.addEventListener('click', close);
      if (sb) sb.addEventListener('click', function (e) { if (e.target.closest('.nav-item') || e.target.closest('.acct-item')) close(); });
      window.addEventListener('hashchange', close);

      /* Mobile bottom tab bar: open drawer + active-state highlighting */
      var tm = document.getElementById('tab-menu');
      if (tm && mb) tm.addEventListener('click', function () { sb.classList.add('open'); ov.classList.add('open'); });
      function syncTabs() {
        var hash = (location.hash || '#dashboard').replace('#', '');
        document.querySelectorAll('.mobile-tabbar .tab[data-match]').forEach(function (t) {
          t.classList.toggle('active', t.getAttribute('data-match') === hash);
        });
      }
      window.addEventListener('hashchange', syncTabs);
      syncTabs();
    })();
  </script>
</body>
</html>
