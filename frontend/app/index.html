<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CouponFind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Mobile drawer overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="app-sidebar glass">
      <div class="px-5 h-16 flex items-center gap-2 border-b hairline">
        <span class="brand-mark" style="width:28px;height:28px;">C</span>
        <span class="font-extrabold">CouponFind</span>
      </div>
      <nav id="nav" class="p-3 grid gap-1" style="flex:1;overflow-y:auto;"></nav>
      <div class="p-3 border-t hairline">
        <button onclick="UI.openCmdk()" class="nav-item w-full" style="justify-content:space-between;">
          <span class="flex items-center gap-2"><span style="width:18px;height:18px;display:inline-flex;" id="cmd-ico"></span> Quick actions</span>
          <span class="badge badge-muted">⌘K</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="app-main">
      <header class="app-header glass flex items-center justify-between px-6 h-16" style="position:sticky;top:0;z-index:30;border-left:none;border-right:none;border-top:none;">
        <div class="flex items-center gap-2" style="flex:1;min-width:0;max-width:560px;">
          <button id="menu-btn" class="menu-btn btn btn-ghost" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div class="header-search flex items-center gap-2" style="flex:1;min-width:0;">
            <span style="width:18px;color:var(--muted);flex:none;" id="hdr-search-ico"></span>
            <input id="global-search" class="input" placeholder="Search coupons… (Enter)" style="border:none;background:transparent;" />
          </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <span id="found-counter" class="badge badge-muted hidden md:inline-flex" title="Coupons found this session">0 coupons found</span>
          <button id="bell" class="btn btn-ghost btn-sm" style="position:relative;"><span style="width:18px;height:18px;display:inline-flex;" id="bell-ico"></span><span id="bell-dot" class="hide" style="position:absolute;top:6px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);"></span></button>
          <div class="flex items-center gap-2">
            <span id="avatar" style="width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;"></span>
            <div class="hidden md:block" style="line-height:1.1;">
              <div id="user-name" class="text-sm font-semibold"></div>
              <div id="user-plan" class="text-xs text-muted"></div>
            </div>
          </div>
          <button id="logout" class="btn btn-ghost btn-sm"><span style="width:16px;height:16px;display:inline-flex;" id="logout-ico"></span></button>
        </div>
      </header>

      <div id="view" class="p-6 max-w-6xl mx-auto"></div>
    </main>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    /* Mobile sidebar drawer toggle */
    (function () {
      var sb = document.getElementById('sidebar');
      var ov = document.getElementById('sidebar-overlay');
      var mb = document.getElementById('menu-btn');
      function open() { sb.classList.add('open'); ov.classList.add('open'); }
      function close() { sb.classList.remove('open'); ov.classList.remove('open'); }
      if (mb) mb.addEventListener('click', open);
      if (ov) ov.addEventListener('click', close);
      if (sb) sb.addEventListener('click', function (e) { if (e.target.closest('.nav-item')) close(); });
      window.addEventListener('hashchange', close);
    })();
  </script>
</body>
</html>
